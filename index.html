<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>流式加载图片查看器（一行一行加载）</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow-x: hidden;
            background: #000; /* 黑色背景，不黑屏等待 */
        }

        /* 核心：启用浏览器原生流式加载，一行一行渲染 */
        .img-container {
            width: 100vw;
            display: block;
        }

        .img-container img {
            width: 100%;
            display: block;
            object-fit: cover;
            /* 关键：让图片一边下载一边显示，不等待全部加载 */
            decoding: async;
            loading: eager;
        }

        /* 右下角悬浮按钮 */
        #floatBtn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.5);
            color: #fff;
            border: none;
            font-size: 16px;
            cursor: pointer;
            z-index: 999;
            transition: 0.3s;
        }

        #floatBtn:hover {
            background: rgba(0, 0, 0, 0.8);
        }

        /* 半透明简介悬浮窗 */
        #infoBox {
            position: fixed;
            bottom: 100px;
            right: 30px;
            width: 320px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.4);
            color: #fff;
            border-radius: 12px;
            z-index: 998;
            display: none;
            pointer-events: none;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div id="imgWrap"></div>
    <button id="floatBtn">简介</button>
    <div id="infoBox"></div>

    <script>
        const resourcePath = './resource/';

        const imgWrap = document.getElementById('imgWrap');
        const floatBtn = document.getElementById('floatBtn');
        const infoBox = document.getElementById('infoBox');

        // 立即插入图片DOM → 浏览器立刻开始流式下载、一行行显示
        // 不等加载完成，不黑屏！
        async function startStreamLoad() {
            let index = 1;

            while (true) {
                const imgUrl = `${resourcePath}${index}.jpg`;

                // 立刻创建图片，立即开始流式加载
                const container = document.createElement('div');
                container.className = 'img-container';
                container.dataset.index = index;

                const img = document.createElement('img');
                img.src = imgUrl;
                img.alt = `图片${index}`;

                container.appendChild(img);
                imgWrap.appendChild(container);

                // 只检查图片是否存在，不等待加载完成
                // 图片一边下载一边显示，第一行秒出
                const exists = await new Promise(resolve => {
                    const test = new Image();
                    test.src = imgUrl;
                    test.onload = () => resolve(true);
                    test.onerror = () => resolve(false);
                });

                if (!exists) {
                    container.remove();
                    break;
                }

                index++;
            }
        }

        // 获取当前屏幕主图
        function getCurrentViewImage() {
            const containers = document.querySelectorAll('.img-container');
            let maxIndex = 1;
            let maxVisible = 0;
            const h = window.innerHeight;

            containers.forEach(c => {
                const r = c.getBoundingClientRect();
                const visible = Math.min(r.bottom, h) - Math.max(r.top, 0);
                if (visible > maxVisible) {
                    maxVisible = visible;
                    maxIndex = c.dataset.index;
                }
            });
            return maxIndex;
        }

        // 悬停显示简介（纯文本、半透明）
        async function showInfo() {
            const idx = getCurrentViewImage();
            try {
                const res = await fetch(`${resourcePath}${idx}.txt`);
                infoBox.innerHTML = res.ok ? await res.text() : '';
            } catch {
                infoBox.innerHTML = '';
            }
            infoBox.style.display = 'block';
        }

        floatBtn.addEventListener('mouseenter', showInfo);
        floatBtn.addEventListener('mouseleave', () => infoBox.style.display = 'none');
        window.addEventListener('scroll', () => {
            if (infoBox.style.display === 'block') showInfo();
        });

        // 页面一打开就开始流式加载，不等待、不黑屏
        startStreamLoad();
    </script>
</body>
</html>
