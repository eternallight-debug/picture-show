<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>逐行扫描图片查看器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow-x: hidden;
            background: #000;
        }

        /* 图片容器：逐行渲染 */
        .img-container {
            width: 100vw;
            position: relative;
            overflow: hidden;
        }

        .img-container img {
            width: 100%;
            display: block;
            opacity: 0; /* 默认隐藏，逐行显示 */
        }

        /* 右下角悬浮按钮 */
        #floatBtn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.5);
            color: #fff;
            border: none;
            font-size: 16px;
            cursor: pointer;
            z-index: 999;
            transition: 0.3s;
        }

        #floatBtn:hover {
            background: rgba(0, 0, 0, 0.7);
        }

        /* 半透明简介悬浮窗 */
        #infoBox {
            position: fixed;
            bottom: 100px;
            right: 30px;
            width: 320px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.4);
            color: #fff;
            border-radius: 12px;
            z-index: 998;
            display: none;
            pointer-events: none;
            line-height: 1.6;
            font-size: 15px;
        }
    </style>
</head>
<body>
    <div id="imgWrap"></div>
    <button id="floatBtn">简介</button>
    <div id="infoBox"></div>

    <script>
        const resourcePath = './resource/';
        const SCAN_LINE_HEIGHT = 30; // 每次扫描 30 像素

        const imgWrap = document.getElementById('imgWrap');
        const floatBtn = document.getElementById('floatBtn');
        const infoBox = document.getElementById('infoBox');

        // ==============================================
        // 核心：逐行扫描加载图片（流式加载，网速越快扫得越快）
        // ==============================================
        async function scanLoadImage(imgUrl, index) {
            const container = document.createElement('div');
            container.className = 'img-container';
            container.dataset.index = index;
            imgWrap.appendChild(container);

            const img = new Image();
            img.src = imgUrl;
            img.crossOrigin = 'anonymous';

            // 等待图片开始加载（流式加载）
            await new Promise(resolve => img.onload = resolve);
            img.style.opacity = 1;

            const imgHeight = img.naturalHeight;
            let currentHeight = 0;

            // 创建遮罩层，实现逐行显示
            const mask = document.createElement('div');
            mask.style.cssText = `
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: #000;
                z-index: 2;
                transition: height 0.05s linear;
            `;
            container.appendChild(mask);
            container.appendChild(img);

            // 逐行向上缩短遮罩 → 显示图片
            const scan = () => {
                if (currentHeight >= imgHeight) {
                    mask.remove(); // 扫描完成，移除遮罩
                    return;
                }
                currentHeight += SCAN_LINE_HEIGHT;
                mask.style.height = `${imgHeight - currentHeight}px`;
                requestAnimationFrame(scan);
            };
            scan();
        }

        // 自动加载所有图片，按顺序逐张扫描
        async function loadAllImages() {
            let index = 1;
            while (true) {
                const url = `${resourcePath}${index}.jpg`;
                try {
                    await scanLoadImage(url, index); // 等待当前图片扫描完成再加载下一张
                    index++;
                } catch (e) {
                    break; // 无更多图片时停止
                }
            }
        }

        // 获取当前屏幕占比最大的图片
        function getCurrentViewImage() {
            const containers = document.querySelectorAll('.img-container');
            let maxIndex = 1;
            let maxVisible = 0;
            const h = window.innerHeight;

            containers.forEach(c => {
                const r = c.getBoundingClientRect();
                const visible = Math.min(r.bottom, h) - Math.max(r.top, 0);
                if (visible > maxVisible) {
                    maxVisible = visible;
                    maxIndex = c.dataset.index;
                }
            });
            return maxIndex;
        }

        // 悬停显示简介（只显示纯文本，半透明）
        async function showInfo() {
            const idx = getCurrentViewImage();
            try {
                const res = await fetch(`${resourcePath}${idx}.txt`);
                infoBox.innerHTML = res.ok ? await res.text() : '';
            } catch {
                infoBox.innerHTML = '';
            }
            infoBox.style.display = 'block';
        }

        floatBtn.addEventListener('mouseenter', showInfo);
        floatBtn.addEventListener('mouseleave', () => infoBox.style.display = 'none');
        window.addEventListener('scroll', () => infoBox.style.display === 'block' && showInfo());

        // 启动
        loadAllImages();
    </script>
</body>
</html>
