<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>彩蛋是音乐《花之舞》</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow-x: hidden;
            background: #000;
        }

        .img-container {
            width: 100vw;
            display: block;
        }

        .img-container img {
            width: 100%;
            display: block;
            object-fit: cover;
            decoding: async;
            loading: eager;
        }

        /* 右下角简介按钮 */
        #floatBtn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.5);
            color: #fff;
            border: none;
            font-size: 16px;
            cursor: pointer;
            z-index: 999;
            transition: 0.3s;
            user-select: none;
            -webkit-user-select: none;
        }

        #floatBtn:hover {
            background: rgba(0, 0, 0, 0.8);
        }

        /* 简介悬浮窗 */
        #infoBox {
            position: fixed;
            width: 320px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.4);
            color: #fff;
            border-radius: 12px;
            z-index: 998;
            display: none;
            pointer-events: none;
            line-height: 1.6;
            user-select: none;
            -webkit-user-select: none;
        }

        /* 完全透明彩蛋音乐按钮 */
        #musicBtn {
            position: fixed;
            bottom: 30px;
            left: 30px;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: transparent !important;
            border: none !important;
            opacity: 0 !important;
            cursor: pointer;
            z-index: 999;
        }

        /* 音乐悬浮窗 */
        #musicBox {
            position: fixed;
            bottom: 100px;
            left: 30px;
            width: 320px;
            height: auto;
            background: transparent;
            border-radius: 12px;
            z-index: 998;
            display: none;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="imgWrap"></div>
    <button id="floatBtn">简介</button>
    <div id="infoBox"></div>

    <button id="musicBtn"></button>
    <div id="musicBox"></div>

    <script>
        const resourcePath = './resource/';

        const imgWrap = document.getElementById('imgWrap');
        const floatBtn = document.getElementById('floatBtn');
        const infoBox = document.getElementById('infoBox');
        const musicBtn = document.getElementById('musicBtn');
        const musicBox = document.getElementById('musicBox');

        // 音乐相关
        let audio = null;
        let fadeTimer = null;
        let hoverStartTime = 0;
        let isFadingIn = false;
        let isFadingOut = false;

        // 初始化音频
        function initAudio() {
            if (!audio) {
                audio = new Audio(`${resourcePath}0.MP3`);
                audio.loop = true;
                audio.volume = 0;
                audio.preload = 'auto';
            }
        }

        // 1秒渐入
        function fadeInAudio() {
            if (isFadingIn || audio.volume >= 1) return;
            isFadingIn = true;
            isFadingOut = false;
            clearInterval(fadeTimer);
            const start = Date.now();
            fadeTimer = setInterval(() => {
                const p = Math.min((Date.now() - start) / 1000, 1);
                audio.volume = p;
                if (p >= 1) {
                    clearInterval(fadeTimer);
                    isFadingIn = false;
                }
            }, 10);
        }

        // 1秒渐出
        function fadeOutAudio() {
            if (isFadingOut || audio.volume <= 0) {
                if (audio) audio.pause();
                return;
            }
            isFadingOut = true;
            isFadingIn = false;
            clearInterval(fadeTimer);
            const start = Date.now();
            fadeTimer = setInterval(() => {
                const p = Math.min((Date.now() - start) / 1000, 1);
                audio.volume = 1 - p;
                if (p >= 1) {
                    clearInterval(fadeTimer);
                    audio.volume = 0;
                    audio.pause();
                    isFadingOut = false;
                }
            }, 10);
        }

        // 鼠标进入彩蛋区
        function handleMusicHoverStart() {
            hoverStartTime = Date.now();
            initAudio();
            audio.play().catch(err => {});
            fadeInAudio();
            musicBox.style.display = 'block';
        }

        // 鼠标离开
        function handleMusicHoverEnd() {
            const d = Date.now() - hoverStartTime;
            const delay = d < 1000 ? 1000 - d : 0;
            setTimeout(() => {
                fadeOutAudio();
                musicBox.style.display = 'none';
            }, delay);
        }

        // 流式加载图片
        async function startStreamLoad() {
            let index = 1;
            while (true) {
                const imgUrl = `${resourcePath}${index}.jpg`;
                const container = document.createElement('div');
                container.className = 'img-container';
                container.dataset.index = index;

                const img = document.createElement('img');
                img.src = imgUrl;
                img.alt = `pic${index}`;
                container.appendChild(img);
                imgWrap.appendChild(container);

                const exists = await new Promise(resolve => {
                    const t = new Image();
                    t.src = imgUrl;
                    t.onload = () => resolve(true);
                    t.onerror = () => resolve(false);
                });

                if (!exists) {
                    container.remove();
                    break;
                }
                index++;
            }
        }

        // ==============================================
        // 核心：PC端原样，移动端按钮在哪张图就显示哪张简介
        // ==============================================
        function getCurrentViewImage() {
            const isMobile = /iPhone|Android|iPad|iPod/.test(navigator.userAgent);

            // PC端：保持你原来逻辑不变
            if (!isMobile) {
                const cs = document.querySelectorAll('.img-container');
                let maxIdx = 1, maxV = 0, h = innerHeight;
                cs.forEach(c => {
                    const r = c.getBoundingClientRect();
                    const v = Math.min(r.bottom, h) - Math.max(r.top, 0);
                    if (v > maxV) { maxV = v; maxIdx = c.dataset.index; }
                });
                return maxIdx;
            }

            // 移动端：按钮中心压住哪张图 → 显示哪张
            const btnRect = floatBtn.getBoundingClientRect();
            const cx = btnRect.left + btnRect.width / 2;
            const cy = btnRect.top + btnRect.height / 2;

            const items = document.querySelectorAll('.img-container');
            for (let item of items) {
                const r = item.getBoundingClientRect();
                if (cx >= r.left && cx <= r.right && cy >= r.top && cy <= r.bottom) {
                    return item.dataset.index;
                }
            }
            return 1;
        }

        // 显示简介（位置跟随按钮）
        async function showInfo() {
            const idx = getCurrentViewImage();
            try {
                const r = await fetch(`${resourcePath}${idx}.txt`);
                infoBox.innerHTML = r.ok ? await r.text() : '';
            } catch {
                infoBox.innerHTML = '';
            }
            infoBox.style.display = 'block';
            const btnRect = floatBtn.getBoundingClientRect();
            const top = btnRect.top - infoBox.offsetHeight - 10;
            const left = btnRect.left + (btnRect.width - infoBox.offsetWidth) / 2;
            infoBox.style.top = `${top}px`;
            infoBox.style.left = `${left}px`;
            infoBox.style.bottom = 'auto';
            infoBox.style.right = 'auto';
        }

        // ========== 拖动逻辑 ==========
        let isDragging = false;
        let dragStartX = 0, dragStartY = 0;
        let btnStartX = 0, btnStartY = 0;
        let touchClickCount = 0;
        let touchClickTimer = null;

        // PC右键拖动
        floatBtn.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            isDragging = true;
            dragStartX = e.clientX;
            dragStartY = e.clientY;
            const rect = floatBtn.getBoundingClientRect();
            btnStartX = rect.left;
            btnStartY = rect.top;
            floatBtn.style.cursor = 'grabbing';
        });

        // 移动端双击拖动
        floatBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            touchClickCount++;
            if (touchClickCount === 1) {
                touchClickTimer = setTimeout(() => touchClickCount = 0, 300);
            } else if (touchClickCount === 2) {
                clearTimeout(touchClickTimer);
                touchClickCount = 0;
                isDragging = true;
                const t = e.touches[0];
                dragStartX = t.clientX;
                dragStartY = t.clientY;
                const rect = floatBtn.getBoundingClientRect();
                btnStartX = rect.left;
                btnStartY = rect.top;
            }
        }, { passive: false });

        // 拖动移动
        document.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const dx = e.clientX - dragStartX;
            const dy = e.clientY - dragStartY;
            floatBtn.style.left = `${btnStartX + dx}px`;
            floatBtn.style.top = `${btnStartY + dy}px`;
            floatBtn.style.bottom = 'auto';
            floatBtn.style.right = 'auto';
            if (infoBox.style.display === 'block') showInfo();
        });

        document.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            e.preventDefault();
            const t = e.touches[0];
            const dx = t.clientX - dragStartX;
            const dy = t.clientY - dragStartY;
            floatBtn.style.left = `${btnStartX + dx}px`;
            floatBtn.style.top = `${btnStartY + dy}px`;
            floatBtn.style.bottom = 'auto';
            floatBtn.style.right = 'auto';
            if (infoBox.style.display === 'block') showInfo();
        }, { passive: false });

        // 结束拖动
        document.addEventListener('mouseup', () => {
            if (isDragging) {
                isDragging = false;
                floatBtn.style.cursor = 'pointer';
            }
        });
        document.addEventListener('touchend', () => {
            isDragging = false;
        });

        // 原有交互
        floatBtn.addEventListener('mouseenter', showInfo);
        floatBtn.addEventListener('mouseleave', () => infoBox.style.display = 'none');
        window.addEventListener('scroll', () => {
            if (infoBox.style.display === 'block') showInfo();
        });

        musicBtn.addEventListener('mouseenter', handleMusicHoverStart);
        musicBtn.addEventListener('mouseleave', handleMusicHoverEnd);

        startStreamLoad();
    </script>
</body>
</html>
